# CopBot TN - Spring Boot Configuration
spring.application.name=copbot-tn

server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/copbot_tn?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# Load sample data on startup (runs after schema is created)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
