<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CopBot TN – Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .auth-tab { flex: 1; padding: 0.6rem; border: 1px solid var(--border); background: var(--accent); cursor: pointer; border-radius: var(--radius); font-weight: 600; }
    .auth-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
  </style>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="logo">TN</span>
      <span><span data-i18n="portalTitle">CopBot TN</span></span>
    </a>
    <div class="navbar-actions">
      <button type="button" class="lang-toggle" id="langToggle">தமிழ்</button>
      <a href="index.html" class="btn-nav" data-i18n="home">Home</a>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="index.html" data-i18n="home">Home</a>
        <a href="rights.html" data-i18n="rights">Know Your Rights</a>
        <a href="fir-guide.html" data-i18n="fir">FIR Guide</a>
        <a href="fees.html" data-i18n="fees">Fees & Charges</a>
        <a href="rules.html" data-i18n="rules">Rules & Regulations</a>
        <a href="faq.html" data-i18n="faq">FAQ</a>
        <a href="chatbot.html" data-i18n="chatbot">Chatbot</a>
        <a href="login.html" class="active" data-i18n="login">Login</a>
      </nav>
    </aside>

    <main class="main-content">
      <h1 class="section-title">Login / Sign Up</h1>
      <p id="userGreeting" style="margin-bottom:1rem;color:var(--text-muted);"></p>

      <div class="auth-container">
        <div class="form-card">
          <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-tab="login">Login</button>
            <button type="button" class="auth-tab" data-tab="signup">Sign Up</button>
          </div>
          <div id="authAlert" class="alert" style="display:none;"></div>

          <div id="loginPanel">
            <form id="loginForm">
              <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
              </div>
              <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required minlength="6">
              </div>
              <button type="submit" class="btn-primary">Login</button>
            </form>
          </div>

          <div id="signupPanel" style="display:none;">
            <form id="signupForm">
              <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" required placeholder="Your name">
              </div>
              <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required>
              </div>
              <div class="form-group">
                <label for="signupPassword">Password (min 6 chars)</label>
                <input type="password" id="signupPassword" required minlength="6">
              </div>
              <button type="submit" class="btn-primary">Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
